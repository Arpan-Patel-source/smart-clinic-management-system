<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Portal - Smart Clinic</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; }
        .header { background-color: #2c3e50; color: white; padding: 15px 20px; text-align: center; }
        .container { display: flex; justify-content: center; align-items: center; height: 80vh; }
        .login-box, .dashboard { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 400px; }
        .login-box h2 { text-align: center; margin-top: 0; color: #333; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background-color: #2980b9; }
        .hidden { display: none; }
        .dashboard { width: 800px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Smart Clinic Management System - Admin Portal</h1>
    </div>
    
    <!-- Login Screen (For Q13) -->
    <div class="container" id="login-view">
        <div class="login-box">
            <h2>Admin Login</h2>
            <input type="text" placeholder="Admin Username" value="admin">
            <input type="password" placeholder="Password" value="password">
            <button onclick="document.getElementById('login-view').classList.add('hidden'); document.getElementById('dashboard-view').classList.remove('hidden');">Login</button>
        </div>
    </div>

    <!-- Dashboard Screen (For Q16: Adding a doctor) -->
    <div class="container hidden" id="dashboard-view" style="align-items: flex-start; margin-top: 40px;">
        <div class="dashboard">
            <h2>Manage Doctors</h2>
            <div style="background: #e8f4f8; padding: 15px; border-radius: 5px; margin-bottom: 20px;">
                <h3>Add New Doctor</h3>
                <input type="text" placeholder="Doctor Name" style="width: 48%; display: inline-block;">
                <input type="text" placeholder="Specialty" style="width: 48%; display: inline-block; float: right;">
                <input type="text" placeholder="Email" style="margin-top: 10px;">
                <button style="background-color: #27ae60; width: 150px;">+ Add Doctor</button>
            </div>
            
            <table>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Specialty</th>
                    <th>Action</th>
                </tr>
                <tr>
                    <td>1</td>
                    <td>Dr. Gregory House</td>
                    <td>Diagnostic Medicine</td>
                    <td><button style="width: auto; padding: 5px 10px; background-color: #e74c3c;">Delete</button></td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>Dr. Allison Cameron</td>
                    <td>Immunology</td>
                    <td><button style="width: auto; padding: 5px 10px; background-color: #e74c3c;">Delete</button></td>
                </tr>
            </table>
        </div>
    </div>
</body>
</html>
